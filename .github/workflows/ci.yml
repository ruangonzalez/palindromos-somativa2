name: CI

on:
  pull_request:
    branches: ["**"]
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run unit tests
        run: python -m unittest discover -v

      - name: Notify Discord
        if: always()
        run: |
          STATUS="${{ job.status }}"
          curl -H "Content-Type: application/json" \
            -X POST \
            -d "{\"content\":\"CI terminou com status: **${STATUS}** no repo **${{ github.repository }}**. Branch: **${{ github.ref_name }}**. Commit: ${{ github.sha }}\"}" \
            "${{ secrets.DISCORD_WEBHOOK }}"
